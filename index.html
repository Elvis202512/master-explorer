<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MASTER EXPLORER | HIGH-FIDELITY ENGINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .terminal { border: 2px solid #00ff41; padding: 40px; background: #050505; box-shadow: 0 0 25px #00ff41; text-align: center; width: 90%; max-width: 600px; z-index: 10; }
        .btn { background: transparent; color: #00ff41; border: 1px solid #00ff41; padding: 20px 40px; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn:hover { background: #00ff41; color: #000; box-shadow: 0 0 15px #00ff41; }
        #status { margin-top: 25px; color: #ffcc00; font-weight: bold; }
        /* Zone de rendu invisible pour construire le document */
        #render-zone { position: absolute; left: -9999px; top: 0; width: 800px; background: white; color: black; padding: 40px; }
        img { max-width: 100%; height: auto; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>[ MASTER ENGINE V18 ]</h1>
    <p>> MODE : RENDU FIDÈLE + IMAGES (133 PAGES)</p>
    <p style="font-size: 0.8em; color: #888;">STATUT : ACCÈS UNIVERSEL (SOURCE ÉTEINTE)</p>
    
    <button class="btn" onclick="document.getElementById('fileIn').click()">LANCER LA CONVERSION</button>
    <input type="file" id="fileIn" accept=".docx" hidden>
    
    <div id="status">PRÊT POUR L'INJECTION</div>
</div>

<div id="render-zone"></div>

<script>
    const fileIn = document.getElementById('fileIn');
    const status = document.getElementById('status');
    const renderZone = document.getElementById('render-zone');

    fileIn.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerText = "> DÉCODAGE DES STRUCTURES ET IMAGES...";
        
        const reader = new FileReader();
        reader.onload = async (event) => {
            try {
                // 1. Conversion DOCX vers HTML (pour garder la mise en page et les images)
                const result = await mammoth.convertToHtml({ arrayBuffer: event.target.result });
                renderZone.innerHTML = result.value;

                status.innerText = "> GÉNÉRATION PDF (133 PAGES)... VEUILLEZ PATIENTER";

                // 2. Paramètres de sortie pour respecter les 133 pages
                const opt = {
                    margin:       10,
                    filename:     `Master_${file.name.replace(".docx", ".pdf")}`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true, logging: false },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
                };

                // 3. Exécution du moteur de rendu (html2pdf)
                await html2pdf().set(opt).from(renderZone).save();

                status.innerText = "> ✅ OPÉRATION RÉUSSIE";
                status.style.color = "#00ff41";
                renderZone.innerHTML = ""; // Nettoyage de la zone
            } catch (err) {
                console.error(err);
                status.innerText = "> ❌ ERREUR CRITIQUE DE RENDU";
                status.style.color = "red";
            }
        };

        reader.readAsArrayBuffer(file);
    };
</script>
</body>
</html>
