<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MASTER EXPLORER | HIGH-FIDELITY ENGINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .terminal { border: 2px solid #00ff41; padding: 30px; background: #050505; box-shadow: 0 0 20px #00ff41; text-align: center; width: 90%; max-width: 600px; }
        .btn { background: transparent; color: #00ff41; border: 1px solid #00ff41; padding: 15px 30px; cursor: pointer; font-weight: bold; margin-top: 20px; text-transform: uppercase; }
        .btn:hover { background: #00ff41; color: #000; }
        #status { margin-top: 20px; color: #ffcc00; font-size: 0.8em; }
        /* Zone invisible pour le rendu */
        #render-zone { display: none; background: white; color: black; padding: 20px; }
    </style>
</head>
<body>

<div class="terminal">
    <h2>[ MASTER ENGINE V17 : FIDÉLITÉ MAX ]</h2>
    <p>> MODE : RENDU VISUEL + IMAGES (133 PAGES)</p>
    <button class="btn" onclick="document.getElementById('in').click()">CONVERTIR AVEC IMAGES</button>
    <input type="file" id="in" hidden onchange="processFull(this.files[0])">
    <div id="status">SYSTÈME PRÊT</div>
</div>

<div id="render-zone"></div>

<script>
    async function processFull(file) {
        const status = document.getElementById('status');
        const renderZone = document.getElementById('render-zone');
        status.innerText = "> EXTRACTION DES IMAGES ET STYLES...";

        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                // Étape 1 : Conversion DOCX vers HTML (garde les images et styles)
                const options = {
                    styleMap: [
                        "p[style-name='Title'] => h1:fresh",
                        "p[style-name='Heading 1'] => h2:fresh"
                    ]
                };
                
                const result = await mammoth.convertToHtml({arrayBuffer: e.target.result}, options);
                renderZone.innerHTML = result.value; // On place le contenu dans la zone blanche

                status.innerText = "> GÉNÉRATION DU PDF (133 PAGES)... PATIENTEZ";

                // Étape 2 : Conversion HTML vers PDF avec html2pdf
                const opt = {
                    margin:       10,
                    filename:     file.name.replace(".docx", ".pdf"),
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
                };

                // Lancement de la capture
                await html2pdf().set(opt).from(renderZone).save();

                status.innerText = "> ✅ RÉUSSI : MISE EN PAGE CONSERVÉE";
                renderZone.innerHTML = ""; // Nettoyage
            } catch (err) {
                status.innerText = "> ❌ ERREUR : LE FICHIER EST TROP LOURD";
                console.error(err);
            }
        };
        reader.readAsArrayBuffer(file);
    }
</script>
</body>
</html>
